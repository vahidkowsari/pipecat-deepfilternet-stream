# Builds DeepFilterLib (Rust, from Rikorose/DeepFilterNet) wheels for Python
# versions PyPI doesn't cover (cp312/cp313 linux), and attaches them to a
# release of this repo so installs don't compile Rust from source.
#
# Uses `pip wheel` inside a manylinux container rather than maturin-action:
# pyDF pins maturin>=0.11,<0.12 and current maturin crashes on its layout,
# while pip honors the project's own build-system pin.
name: build-deepfilterlib-wheels

on:
  workflow_dispatch:
    inputs:
      dfn_tag:
        description: "Rikorose/DeepFilterNet tag to build"
        default: "v0.5.6"
      release_tag:
        description: "Release of this repo to attach wheels to"
        default: "v0.1.0"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: Rikorose/DeepFilterNet
          ref: ${{ inputs.dfn_tag }}

      - name: Build wheels in manylinux_2_28 container
        run: |
          docker run --rm -v "$PWD":/io -w /io quay.io/pypa/manylinux_2_28_${{ matrix.arch }} bash -ec '
            curl -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
            source "$HOME/.cargo/env"
            for py in cp312-cp312 cp313-cp313; do
              /opt/python/$py/bin/pip wheel ./pyDF --no-deps -w raw
            done
            for whl in raw/*linux*.whl; do auditwheel repair "$whl" -w wheels; done
            ls -l wheels
          '

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.arch }}
          path: wheels/*.whl

  attach:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: wheels
      - run: gh release upload "${{ inputs.release_tag }}" wheels/*.whl --clobber --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ github.token }}
